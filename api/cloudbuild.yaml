steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '-t'
      - '${_IMAGE}:${SHORT_SHA}'
      - '-t'
      - '${_IMAGE}:latest'
      - '-f'
      - 'api/Dockerfile'
      - 'api'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE}:${SHORT_SHA}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE}:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image'
      - '${_IMAGE}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '300'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'FIREBASE_PROJECT_ID=toolbox-67a0e,GCP_PROJECT_ID=${_GCP_PROJECT_ID},ENVIRONMENT=staging'
      - '--set-secrets'
      - 'DATABASE_URL=sunos-database-url-staging:latest,GOOGLE_API_KEY=sunos-google-api-key:latest'
      - '--labels'
      - 'app=sunos,env=staging,service=sunos-api'

images:
  - '${_IMAGE}:${SHORT_SHA}'
  - '${_IMAGE}:latest'

substitutions:
  _SERVICE: 'sunos-api-staging'
  _REGION: 'us-central1'
  _GCP_PROJECT_ID: 'koro-creators'
  _IMAGE: 'us-central1-docker.pkg.dev/koro-creators/sunos-api/api-staging'

options:
  machineType: 'E2_HIGHCPU_8'
  substitutionOption: 'ALLOW_LOOSE'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
