# Cloud Build — sunOS Frontend (Next.js 14)
# ADR-014: Cloud Run, us-west1, standalone output
#
# Trigger: push to main, paths: app/**, components/**, lib/**, public/**, next.config.mjs

steps:
  # ── 1. Build ──────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - 'build'
      - '--cache-from'
      - '${_IMAGE}:latest'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '-t'
      - '${_IMAGE}:${SHORT_SHA}'
      - '-t'
      - '${_IMAGE}:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # ── 2. Push ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-sha
    waitFor: [build]
    args: ['push', '${_IMAGE}:${SHORT_SHA}']

  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    waitFor: [build]
    args: ['push', '${_IMAGE}:latest']

  # ── 3. Deploy ─────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    waitFor: [push-sha]
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image'
      - '${_IMAGE}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'sunos-frontend@${_GCP_PROJECT_ID}.iam.gserviceaccount.com'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '60'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--port'
      - '3000'
      - '--set-env-vars'
      - 'NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1,NEXT_PUBLIC_API_URL=https://sunos-api-${_GCP_PROJECT_ID}.${_REGION}.run.app'
      - '--labels'
      - 'app=sunos,env=production,service=sunos-frontend,managed-by=cloud-build'

images:
  - '${_IMAGE}:${SHORT_SHA}'
  - '${_IMAGE}:latest'

substitutions:
  _SERVICE: 'sunos-frontend'
  _REGION: 'us-west1'
  _GCP_PROJECT_ID: 'koro-creators'
  _IMAGE: 'us-west1-docker.pkg.dev/koro-creators/sunos/frontend'

options:
  machineType: 'E2_HIGHCPU_8'
  substitutionOption: 'ALLOW_LOOSE'
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

timeout: '900s'
