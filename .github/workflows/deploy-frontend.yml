# Deploy do frontend (sunos-frontend) para Cloud Run em produção (us-west1).
# Dispara automaticamente em push na main quando o código do frontend muda
# (tudo que não for exclusivamente api/, docs/, .claude/ ou *.md).
# Requer secrets: WIF_PROVIDER, WIF_SERVICE_ACCOUNT.
name: Deploy — Frontend (prod)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'api/**'
      - 'docs/**'
      - '.claude/**'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do deploy manual'
        required: false
        default: 'Deploy manual do frontend'

concurrency:
  group: deploy-frontend-prod
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: koro-creators
  REGION: us-west1
  SERVICE: sunos-frontend
  IMAGE: us-west1-docker.pkg.dev/koro-creators/sunos/frontend
  RUNTIME_SA: sunos-frontend@koro-creators.iam.gserviceaccount.com
  # NEXT_PUBLIC_* é inlined no bundle em build-time — precisa ser build-arg.
  NEXT_PUBLIC_API_URL: https://sunos-api-mx3edyv2za-uw.a.run.app

jobs:
  deploy:
    name: Build & deploy sunos-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-west1-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          # Config do Firebase — inlined no bundle em build-time (build-args).
          # São NEXT_PUBLIC_* (vão para o bundle público), guardados como secrets.
          FB_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          FB_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          # Token p/ instalar o pacote privado @koro-creators/projetos (GitHub
          # Packages) dentro do docker build — entra como secret do BuildKit.
          DOCKER_BUILDKIT: "1"
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Backend do Venus para a feature Projetos (rewrites em build-time).
          # Definir em Settings → Secrets and variables → Actions → Variables.
          # Vazio → aba Projetos sem dados (rewrite desligado).
          VENUS_API_URL: ${{ vars.VENUS_API_URL }}
        run: |
          docker build \
            --secret id=node_auth_token,env=NODE_AUTH_TOKEN \
            --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            --build-arg VENUS_API_URL="$VENUS_API_URL" \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$FB_API_KEY" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$FB_AUTH_DOMAIN" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$FB_PROJECT_ID" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="$FB_STORAGE_BUCKET" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="$FB_SENDER_ID" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="$FB_APP_ID" \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            -f Dockerfile .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE:${{ github.sha }}" \
            --region "$REGION" \
            --platform managed \
            --service-account "$RUNTIME_SA" \
            --port 3000 \
            --cpu 1 \
            --memory 512Mi \
            --max-instances 5 \
            --set-env-vars "NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1,NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}" \
            --labels "app=sunos,env=production,service=sunos-frontend"

      - name: Smoke test (/)
        run: |
          URL=$(gcloud run services describe "$SERVICE" --region "$REGION" --format 'value(status.url)')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
          echo "GET $URL/ -> $STATUS"
          if [ "$STATUS" != "200" ]; then echo "Smoke test falhou: $STATUS"; exit 1; fi
